        all_posts_label: "Browse the blog"
    about:
      meta:
        title: "About | Andrew Denta"
        description: "An overview of Andrew Denta: founder, engineer, and operator working on AI systems that reduce operational drag."
      hero:
        eyebrow: "About"
        title: "I like software that makes messy work feel legible."
        body: "This is a temporary overview page, but the shape is real: I tend to work where product judgment, operational complexity, and applied AI all intersect."
      summary:
        title: "Short version"
        paragraphs:
          - "I have spent most of my career around systems that only work if they stay honest about the real workflow underneath them."
          - "That includes building a logistics company, working inside larger operating environments, and shipping software where ambiguity gets expensive quickly."
          - "The thread through all of it is straightforward: useful products reduce interpretation overhead and help teams move with more confidence."
      background:
        title: "Background"
        items:
          - "Founder of an acquired YC logistics company, with a bias toward products that survive real operational pressure."
          - "Built in workflow-heavy environments at Uber Freight and Handshake, where clarity matters more than novelty."
          - "Now focused on AI systems and internal tools across logistics, finance, and media."
      working_style:
        title: "Working style"
        items:
          - "I prefer narrow, believable scopes over impressive roadmaps that hide the hard parts."
          - "I care a lot about handoffs, review loops, failure modes, and whether the software stays usable after the demo energy wears off."
          - "The best work usually comes from pairing product judgment with enough implementation depth to make tradeoffs concrete."
      focus_areas:
        title: "Focus areas"
        items:
          - "Applied AI systems that need strong product and workflow design around uncertain model behavior."
          - "Internal tools and operating software that reduce drag in exception-heavy processes."
          - "Product positioning and interface systems for technical companies that need to sound credible quickly."
      cta:
        label: "Say hello"
        href: "https://linkedin.com/in/adenta"
    blog:
      index:
        meta:
          title: "Writing | Andrew Denta"
          description: "Essays, notes, and practical writing on AI, software, systems, and the operational edges where products either hold up or fail."
        eyebrow: "Andrew Denta"
        title: "Writing on AI, software, and the systems that make ambitious work feel calmer."
        body: "Essays, experiments, and practical notes on product judgment, operational friction, growth, and the workflows that reveal where software holds up."
        home_link_label: "Back to home"
        empty_state: "Add markdown files to"
    services:
      meta:
        title: "Services | Andrew Denta"
        description: "Three ways Andrew Denta helps teams ship AI and workflow-heavy systems that hold up in real operating environments."
      hero:
        eyebrow: "Services"
        title: "Build AI systems that stay useful after the demo."
        body: "This page borrows the basic pacing of a consulting offers page on purpose: clear engagement models, concrete fit, and a direct path to a conversation if the work is real."
      offers:
        - name: "Advisory"
          tagline: "You build, I sharpen the decisions"
          summary: "For teams that already ship well but want tighter judgment on scope, workflow design, and where AI should or should not sit in the product."
          cadence: "Ongoing cadence, usually weekly"
          what_you_get:
            - "Weekly working sessions focused on product direction, architecture choices, and rollout tradeoffs."
            - "Fast async input for decisions that should not wait until the next meeting."
            - "Practical framing for evaluation, trust, and operating-model questions before they become expensive."
          best_fit:
            - "You have strong builders internally and want sharper direction, not outsourced ownership."
            - "You need help deciding what to simplify, not just what to add."
            - "You want internal leverage without accumulating consultant-shaped dependencies."
        - name: "Embedded build sprint"
          tagline: "We build together"
          summary: "For teams that need real progress quickly and want the implementation, product, and operating model to tighten up at the same time."
          cadence: "Focused sprint, usually 4 to 8 weeks"
          featured: true
          what_you_get:
            - "Hands-on work inside the team to scope, ship, and pressure-test the right slice."
            - "A shared build rhythm that leaves behind code, decisions, and a clearer product point of view."
            - "A gradual handoff instead of a black-box delivery at the end."
          best_fit:
            - "You need momentum now, but you also want the team to own the system afterward."
            - "The work touches product, implementation, and operations all at once."
            - "You learn best by shipping, not by waiting for a report."
        - name: "Done-with-you delivery"
          tagline: "I lead the build, your team gets the handoff"
          summary: "For teams at capacity that still need something real shipped, documented, and understandable without turning the roadmap into a hostage situation."
          cadence: "Defined build and handoff window"
          what_you_get:
            - "A narrower, execution-first engagement with minimal process overhead."
            - "Documentation, runbooks, and a handoff path that makes long-term ownership realistic."
            - "A production-minded build shaped around reliability and legibility, not just speed."
          best_fit:
            - "Your team is overloaded and cannot absorb the full build right now."
            - "You need a concrete system in place more than you need a long learning process."
            - "You want the final result to be maintainable by an internal team."
      proof_strip:
        title: "Why this work tends to fit"
        items:
          - "Founder of an acquired YC logistics company, with strong instincts for high-friction workflows."
          - "Built inside larger operational systems at Uber Freight and Handshake."
          - "Current work spans AI systems across logistics, finance, and media."
      cta:
        title: "If the work is real, start there."
        body: "The first conversation is usually about the operating reality, the surface area that matters, and whether the team actually needs advisory, a sprint, or a more execution-heavy path."
        label: "Start a conversation"
        href: "https://linkedin.com/in/adenta"
    projects:
      meta:
        title: "Projects | Andrew Denta"
        description: "Selected project notes and past work from Andrew Denta across logistics, AI systems, and operational software."
      hero:
        eyebrow: "Projects"
        title: "Selected projects from systems-heavy work."
        body: "This is separate from the blog on purpose. These entries are project notes and operating contexts, not general writing."
      empty_state: "Project entries will show up here once tagged markdown files are added."
